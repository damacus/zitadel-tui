services:
  zitadel-tui:
    build: .
    image: zitadel-tui:latest
    container_name: zitadel-tui
    stdin_open: true
    tty: true
    volumes:
      # Persist configuration
      - ${HOME}/.config/zitadel-tui:/root/.config/zitadel-tui
      # Optional templates file
      - ${HOME}/.zitadel-tui.yml:/root/.zitadel-tui.yml:ro
    environment:
      - TERM=xterm-256color
