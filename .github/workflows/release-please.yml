name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish, for example v0.1.4
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  attestations: write
  id-token: write
  packages: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-context:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ always() }}
    outputs:
      should_publish: ${{ steps.context.outputs.should_publish }}
      tag_name: ${{ steps.context.outputs.tag_name }}
    steps:
      - name: Resolve release tag
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          RELEASES_CREATED: ${{ needs.release-please.outputs.releases_created }}
          RELEASE_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            echo "tag_name=${INPUT_TAG_NAME}" >> "${GITHUB_OUTPUT}"
          elif [[ "${RELEASES_CREATED}" == "true" ]]; then
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            echo "tag_name=${RELEASE_TAG_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          fi

  build-binaries:
    name: Build release binary
    needs: release-context
    if: ${{ needs.release-context.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact
        run: |
          mkdir -p artifacts
          cp target/release/zitadel-tui artifacts/zitadel-tui-linux-amd64
          chmod +x artifacts/zitadel-tui-linux-amd64
          tar czf artifacts/zitadel-tui-linux-amd64.tar.gz -C artifacts zitadel-tui-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zitadel-tui-linux-amd64
          path: artifacts/zitadel-tui-linux-amd64.tar.gz

  github-release:
    name: Create GitHub Release
    needs: [release-context, build-binaries]
    if: ${{ needs.release-context.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          find artifacts -name '*.tar.gz' -exec sha256sum {} \; > artifacts/checksums-sha256.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-context.outputs.tag_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums-sha256.txt

  docker:
    needs: release-context
    if: ${{ needs.release-context.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-context.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-context.outputs.tag_name }}
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-crate:
    name: Publish to crates.io
    needs: release-context
    if: ${{ needs.release-context.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
